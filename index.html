<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Boost</title>

  <!-- Fuente moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>

  <section class="hero">
    <div class="card">
      <h1>AI BOOST 🚀</h1>
      <p>
        Automatiza tu productividad con Inteligencia Artificial.
        Recibe prompts, herramientas y recursos premium en tu correo.
      </p>

      <form id="subscribe-form">
        <input type="email" id="email" placeholder="Ingresa tu email" required>
        <button type="submit">Quiero Acceder</button>
      </form>

      <div id="message"></div>

      <ul class="features">
        <li>Prompts exclusivos</li>
        <li>Herramientas IA</li>
        <li>Automatizaciones</li>
        <li>Recursos gratuitos</li>
      </ul>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
